# Configuración de yt-dlp - Extrema robustez para listas de descargas
# Autor: Francesc Fosas

# 1. Directorio de descarga y estructura de nombres
# El [ID] al final es clave: si el vídeo desaparece, puedes recuperar el enlace original.
# El instalador reemplazará PLACEHOLDER_DIR por la ruta que elijas.
-o "PLACEHOLDER_DIR/%(playlist_title|)s%(playlist_title&/|)s%(playlist_index|)s%(playlist_index& - |)s%(title)s [%(id)s].%(ext)s"

# Descomenta para guardar un archivo .json con toda la info del vídeo (enlace, descripción, etc.)
# --write-info-json

# Evita volver a descargar vídeos que ya terminaste (aunque sigan en el .txt)
# Crea un registro en historial.txt para que la comprobación sea instantánea.
--download-archive "PLACEHOLDER_DIR/historial.txt"

# Asegura compatibilidad de nombres de archivos (evita errores en discos NTFS/FAT32)
--restrict-filenames

# 2. Calidad y Formato
-f "bestvideo+bestaudio/best"
--merge-output-format mp4

# 3. Persistencia y Reanudación
--continue
--no-overwrites
--concurrent-fragments 10  # 10 fragmentos en paralelo para máxima velocidad
--buffer-size 1M            # Búfer grande para flujo de datos rápido

# 4. Privacidad, Acceso y Seguridad (Evita bloqueos)
# --cookies-from-browser brave  # Desactivado: navegación anónima (protege la cuenta de Google)
--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.31 (KHTML, like Gecko) Chrome/131.0.0.0 Safari/537.31"
--sleep-interval 5       # Espera mínima entre vídeos para no parecer un bot
--max-sleep-interval 15  # Espera máxima aleatoria
--ignore-errors          # Si un vídeo falla, salta al siguiente sin detener la cola

# 5. Metadatos y Extras (Incrustados directamente en el archivo)
--embed-thumbnail
--add-metadata
--embed-subs
--write-auto-subs

# 6. Limpieza
--trim-filenames 160
