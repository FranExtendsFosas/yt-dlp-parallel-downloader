# Configuracion optimizada de yt-dlp - Extrema robustez
# Autor: Francesc Fosas

# 1. Directorio y Nomenclatura (Soporte para carpetas automaticas en Playlists)
-o "PLACEHOLDER_DIR/%(playlist_title)s%(playlist_title&/|)s%(playlist_index& - |)s%(title)s [%(id)s].%(ext)s"

# --write-info-json # Opcional: Descomenta para guardar metadatos en JSON
--download-archive "PLACEHOLDER_DIR/historial.txt"
--restrict-filenames

# 2. Calidad de Salida
-f "bestvideo+bestaudio/best"
--merge-output-format mp4

# 3. Rendimiento de Red y Escritura
--continue               # Reanudación automática de descargas interrumpidas
--no-overwrites          # Evitar la sobreescritura de archivos existentes
--concurrent-fragments 10 # Descarga segmentada concurrente
--buffer-size 1M         # Optimización de buffer para escritura en disco

# 4. Privacidad y Seguridad (Evasión de Bloqueos)
# --cookies-from-browser brave  # Opcional: Descomenta si necesitas bajar videos privados o con restriccion de edad
--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.31 (KHTML, like Gecko) Chrome/131.0.0.0 Safari/537.31"
--sleep-interval 5      # Latencia mínima entre vídeos
--max-sleep-interval 15 # Latencia máxima aleatoria
--ignore-errors         # Continuidad de ejecucion ante fallos en enlaces individuales (Gestionado por el script de bucle)

# 5. Metadatos y Extras
--embed-thumbnail
--add-metadata
--embed-subs
--write-auto-subs

# 6. Limpieza
--trim-filenames 160
