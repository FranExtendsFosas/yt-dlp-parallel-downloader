# Configuracion optimizada de yt-dlp

# 1. Directorio y Nomenclatura
-o "PLACEHOLDER_DIR/%(playlist_title&| )s%(playlist_title&/| )s%(playlist_index& - |)s%(title)s [%(id)s].%(ext)s"
--write-info-json
--download-archive "PLACEHOLDER_DIR/historial.txt"
--restrict-filenames

# 2. Calidad de Salida
-f "bestvideo+bestaudio/best"
--merge-output-format mp4

# 3. Rendimiento de Red y Escritura
--continue               # Reanudacion automatica de descargas interrumpidas
--no-overwrites         # Evitar la sobreescritura de archivos existentes
--concurrent-fragments 10 # Descarga segmentada concurrente
--buffer-size 1M         # Optimizacion de buffer para escritura en disco

# 4. Seguridad y Evasion de Bloqueos
--cookies-from-browser brave  # Extraccion de cookies de sesion activa
--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.31 (KHTML, like Gecko) Chrome/131.0.0.0 Safari/537.31" # Identidad de navegador moderno
--sleep-interval 5           # Latencia minima entre solicitudes
--max-sleep-interval 15      # Latencia maxima aleatoria para simulacion de comportamiento humano
--ignore-errors              # Continuidad de ejecucion ante fallos en enlaces individuales

# 5. Metadatos y Subtitulos
--embed-thumbnail
--add-metadata
--embed-subs
--write-auto-subs
