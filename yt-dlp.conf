# Configuración optimizada de yt-dlp

# 1. Directorio y Nombres
-o "PLACEHOLDER_DIR/%(playlist_title&| )s%(playlist_title&/| )s%(playlist_index& - |)s%(title)s [%(id)s].%(ext)s"
--write-info-json
--download-archive "PLACEHOLDER_DIR/historial.txt"
--restrict-filenames

# 2. Calidad
-f "bestvideo+bestaudio/best"
--merge-output-format mp4

# 3. Velocidad y Red
--continue               # Reanuda descargas interrumpidas automáticamente
--no-overwrites         # No pisa archivos ya existentes
--concurrent-fragments 10 # Descarga 10 partes de un mismo vídeo a la vez (ideal para fibra)
--buffer-size 1M         # Búfer de 1MB para evitar cuellos de botella en la escritura a disco

# 4. Antidetección y Seguridad
--cookies-from-browser brave  # Usa tu sesión del navegador para evitar ser marcado como bot
--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.31 (KHTML, like Gecko) Chrome/131.0.0.0 Safari/537.31" # Se identifica como un navegador real
--sleep-interval 5           # Mínimo de 5 segundos entre cada vídeo de la lista
--max-sleep-interval 15      # Pausa aleatoria máxima para simular comportamiento humano
--ignore-errors              # Si un link falla, continúa con el resto de la lista automáticamente

# 5. Metadatos
--embed-thumbnail
--add-metadata
--embed-subs
--write-auto-subs
