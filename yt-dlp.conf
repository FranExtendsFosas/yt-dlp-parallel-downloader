# Configuración optimizada de yt-dlp

# 1. Directorio y Nombres
-o "/mnt/Ext_2tb/DESCARGAS/yt-dlp/%(playlist_title&| )s%(playlist_title&/| )s%(playlist_index& - |)s%(title)s [%(id)s].%(ext)s"
--write-info-json
--download-archive "/mnt/Ext_2tb/DESCARGAS/yt-dlp/historial.txt"
--restrict-filenames

# 2. Calidad
-f "bestvideo+bestaudio/best"
--merge-output-format mp4

# 3. Velocidad y Red
--continue
--no-overwrites
--concurrent-fragments 10
--buffer-size 1M

# 4. Antidetección y Seguridad
--cookies-from-browser brave
--user-agent "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.31 (KHTML, like Gecko) Chrome/131.0.0.0 Safari/537.31"
--sleep-interval 5
--max-sleep-interval 15
--ignore-errors

# 5. Metadatos
--embed-thumbnail
--add-metadata
--embed-subs
--write-auto-subs
